<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CardijnChat</title>
  <style>
    :root {
      --bg-color: #f0f2f5;
      --primary-color: #0084ff;
      --primary-hover: #006bcf;
      --text-color: #1c1e21;
      --text-muted: #65676b;
      --card-bg: #ffffff;
      --border-color: #e4e6eb;
      --msg-self: #0084ff;
      --msg-self-text: #ffffff;
      --msg-other: #e4e6eb;
      --msg-other-text: #050505;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: -webkit-fill-available;
      overflow: hidden;
    }

    html {
      height: -webkit-fill-available;
    }

    /* --- Header --- */
    header {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 16px;
      z-index: 10;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .brand-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 600px;
    }

    .brand {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary-color);
      letter-spacing: -0.5px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ff4d4f;
      transition: background-color 0.3s;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.online {
      background-color: #52c41a;
    }

    .connection-status {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    /* --- Hauptbereich --- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      background: var(--card-bg);
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      overflow: hidden;
    }

    /* --- Chat-Nachrichten --- */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      position: relative;
      word-break: break-word;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.other {
      background-color: var(--msg-other);
      color: var(--msg-other-text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.self {
      background-color: var(--msg-self);
      color: var(--msg-self-text);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-meta {
      font-size: 10px;
      margin-bottom: 3px;
      display: block;
      font-weight: 700;
      opacity: 0.7;
    }

    /* --- Chat Eingabebereich --- */
    .input-area {
      padding: 12px 16px;
      background-color: var(--card-bg);
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .message-input {
      flex: 1;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      padding: 10px 16px;
      border-radius: 20px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .message-input:focus {
      border-color: var(--primary-color);
      background-color: var(--card-bg);
    }

    .send-btn {
      background-color: var(--primary-color);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background-color: var(--primary-hover);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      transform: rotate(45deg) translate(-1px, 1px);
    }

    .info-bar {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 6px;
      background: var(--bg-color);
      border-bottom: 1px solid var(--border-color);
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-container">
      <span class="brand">CardijnChat</span>
      <div class="connection-status">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">Verbinde...</span>
      </div>
    </div>
  </header>

  <div class="info-bar">
    Lokaler Chat. Nachrichten sind anonym und flüchtig. Max. 40 Nachrichten.
  </div>

  <main>
    <div id="chat-container" class="chat-container"></div>

    <div class="input-area">
      <input type="text" id="msg-input" class="message-input" placeholder="Nachricht schreiben..." maxlength="200" onkeydown="if(event.key === 'Enter') sendMsg()">
      <button class="send-btn" onclick="sendMsg()" aria-label="Senden">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
  </main>

  <script>
    let ws;
    let myUid = '';
    let reconnectTimeout = null;

    const chatContainer = document.getElementById('chat-container');
    const msgInput = document.getElementById('msg-input');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    function connectWS() {
      if (ws) {
        ws.close();
      }

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws`;

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        statusDot.className = 'status-dot online';
        statusText.innerText = 'Verbunden';
        if (reconnectTimeout) {
          clearTimeout(reconnectTimeout);
          reconnectTimeout = null;
        }
        requestRoomInit();
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          if (data.type === 'init') {
            myUid = data.uid || '';
            localStorage.setItem('cardijn_uid', myUid);
            renderMessages(data.messages || []);
          }
          else if (data.type === 'msg') {
            appendMessage(data.msg);
          }
        } catch (e) {
          console.error("Fehler beim Verarbeiten der WebSocket-Nachricht:", e);
        }
      };

      ws.onclose = () => {
        statusDot.className = 'status-dot';
        statusText.innerText = 'Getrennt';
        if (!reconnectTimeout) {
          reconnectTimeout = setTimeout(connectWS, 2000);
        }
      };

      ws.onerror = () => {
        ws.close();
      };
    }

    function requestRoomInit() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        const savedUid = localStorage.getItem('cardijn_uid');
        ws.send(JSON.stringify({
          type: 'init',
          uid: savedUid || ''
        }));
      }
    }

    function sendMsg() {
      const text = msgInput.value.trim();
      if (!text) return;

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          type: 'post',
          text: text
        }));
        msgInput.value = '';
        msgInput.focus();
      } else {
        alert('Keine Verbindung zum Server.');
      }
    }

    function renderMessages(messages) {
      chatContainer.innerHTML = '';
      messages.forEach(msg => appendMessage(msg, false));
      scrollToBottom();
    }

    function appendMessage(msgStr, scroll = true) {
      let uid = '';
      let text = msgStr;

      const match = msgStr.match(/^\[([A-Fa-f0-9]{4})\]\s(.*)/);
      if (match) {
        uid = match[1];
        text = match[2];
      }

      const msgDiv = document.createElement('div');
      const isSelf = (uid === myUid && myUid !== '');
      msgDiv.className = `message ${isSelf ? 'self' : 'other'}`;

      const metaSpan = document.createElement('span');
      metaSpan.className = 'msg-meta';
      metaSpan.innerText = isSelf ? `Du (${uid})` : (uid ? `Nutzer ${uid}` : 'System');
      msgDiv.appendChild(metaSpan);

      const textSpan = document.createElement('span');
      textSpan.innerHTML = text;
      msgDiv.appendChild(textSpan);

      chatContainer.appendChild(msgDiv);

      if (scroll) {
        scrollToBottom();
      }
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    window.onload = () => {
      connectWS();
      document.body.addEventListener('touchmove', (e) => {
        if (e.target.closest('#chat-container')) return;
        e.preventDefault();
      }, { passive: false });
    };
  </script>
</body>
</html>
